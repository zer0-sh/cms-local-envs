name: Build & Push Drupal

on:
  push:
    branches: [main]
    paths:
      - 'drupal/**'
  pull_request:
    branches: [main]
    paths:
      - 'drupal/**'

env:
  IMAGE_NAME: steven58380/drupal

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        id: login
        if: github.event_name == 'push' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set deploy flag
        id: deploycheck
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./drupal
          push: ${{ github.event_name == 'push' && steps.deploycheck.outputs.enabled == 'true' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Build Results
          | Detail | Value |
          |--------|-------|
          | Image | \`${{ env.IMAGE_NAME }}\` |
          | Tags | \`${{ steps.meta.outputs.version }}\` |
          | Pushed | \`${{ github.event_name == 'push' && steps.deploycheck.outputs.enabled == 'true' }}\` |
          | Digest | \`${{ steps.build.outputs.digest || 'N/A (PR build)' }}\` |
          EOF

      - name: Notice missing credentials
        if: steps.deploycheck.outputs.enabled == 'false'
        run: |
          echo "## Notice" >> $GITHUB_STEP_SUMMARY
          echo "Docker credentials not found. Push and deploy skipped." >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scanning
        run: |
          cd drupal
          docker build -t ${{ env.IMAGE_NAME }}:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'table'
          output: 'trivy-results.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Run Trivy JSON
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:scan'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Generate security summary
        run: |
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-results.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-results.json 2>/dev/null || echo 0)
          MEDIUM=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="MEDIUM")] | length' trivy-results.json 2>/dev/null || echo 0)
          TOTAL=$((CRITICAL + HIGH + MEDIUM))
          {
            echo "## Security Scan Results"
            echo ""
            if [ "$CRITICAL" -eq 0 ] && [ "$HIGH" -eq 0 ]; then
              echo "No critical or high vulnerabilities found"
            else
              echo "Vulnerabilities detected"
            fi
            echo ""
            echo "| Severity | Count |"
            echo "|----------|-------|"
            echo "| Critical | ${CRITICAL} |"
            echo "| High | ${HIGH} |"
            echo "| Medium | ${MEDIUM} |"
            echo "| Total | ${TOTAL} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-drupal
          path: trivy-results.*

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.event_name == 'push' && needs.build.outputs.image-tag != '' && secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != ''
    environment: production
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}/drupal
            docker compose pull
            docker compose up -d --no-build
            docker image prune -f

      - name: Verify deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" -L http://localhost:8082)
            if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
              exit 0
            else
              exit 1
            fi

      - name: Deploy summary
        if: always()
        run: |
          {
            echo "## Deployment Results"
            echo ""
            echo "| Detail | Value |"
            echo "|--------|-------|"
            echo "| Environment | production |"
            echo "| Image | \`${{ env.IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
            echo "| Status | ${{ job.status }} |"
          } >> "$GITHUB_STEP_SUMMARY"
